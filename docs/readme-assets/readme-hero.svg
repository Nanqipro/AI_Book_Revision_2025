    <text x="72" y="437" font-size="16" fill="#a9c9bc">2025 第一版 · LaTeX 教材源稿与配套资源</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="770" y="80" width="330" height="320" rx="30" fill="#ffffff" opacity="0.96"/>
    <rect x="891" y="171" width="88" height="88" rx="18" fill="url(#chip)"/>
    <text x="935" y="227" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="800" fill="#072f25">AI</text>

    <g stroke="#0f6b50" stroke-width="3" fill="none" opacity="0.78">
      <path d="M891 195 H838 V145"/>
      <path d="M979 195 H1032 V145"/>
