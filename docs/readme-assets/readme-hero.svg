    <text x="935" y="368" text-anchor="middle" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="650" fill="#6b8078">KNOW · APPLY · REFLECT</text>
